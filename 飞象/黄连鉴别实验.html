        .iframe-container { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }

        .iframe-container iframe.active { display: block; }
        @media (max-width: 768px) {

        .loading-overlay { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; background: #EBEDD4; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.5s ease; }

        /* 部署前将此占位符替换为 QuickForm 在线版的 API 地址 */
        const QF_API_URL = 'https://quickform.cn/api/6j5brcvhjf';

        /* ====== QuickForm 数据采集核心 ====== */
        // 生成唯一访客ID（存localStorage，同一浏览器复用）
        function getVisitorId() {
            let vid = localStorage.getItem('qf_visitor_id');
            if (!vid) {
                vid = 'V_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
                localStorage.setItem('qf_visitor_id', vid);
            }
            return vid;
        }
        const QF_VISITOR_ID = getVisitorId();

        // 记录每题首次作答
        const qfFirstAnswers = {};
        function recordFirstAnswer(expIdx, qIdx, qType, userAnswer, isCorrect) {
            const qSuffix = typeof qIdx === 'number' ? qIdx + 1 : qIdx;
            const key = `exp${expIdx+1}_q${qSuffix}`;
            if (!qfFirstAnswers[key]) {
                qfFirstAnswers[key] = {
                    experiment: ['性状鉴定', '显微鉴别', '理化鉴别'][expIdx],
                    questionId: key,
                    questionType: qType,
                    firstAnswer: userAnswer,
                    isCorrect: isCorrect,
                    timestamp: new Date().toISOString()
                };
            }
        }

        // 汇总并提交数据到QuickForm
        function submitToQuickForm() {
            if (QF_API_URL === 'PLACEHOLDER_REPLACE_WITH_QUICKFORM_API_URL') {
                console.log('[QuickForm] API地址未配置，跳过数据提交');
                return;
            }
            const payload = {
                visitorId: QF_VISITOR_ID,
                submitTime: new Date().toISOString(),
                answers: qfFirstAnswers
            };
            fetch(QF_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => {
                if (r.ok) console.log('[QuickForm] 数据提交成功');
                else console.warn('[QuickForm] 提交失败:', r.status);

            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return new TextDecoder().decode(bytes);
        }

                html = html.replace(/style="top: 30%; left: 30%;" onclick="showDetail\('石细胞'/, 'style="top: 25%; left: 23%;" onclick="showDetail(\'石细胞\'');
                html = html.replace(/style="top: 40%; left: 60%;" onclick="showDetail\('中柱鞘纤维'/, 'style="top: 26%; left: 61%;" onclick="showDetail(\'中柱鞘纤维\'');
                html = html.replace(/style="top: 70%; left: 40%;" onclick="showDetail\('导管'/, 'style="top: 69%; left: 89%;" onclick="showDetail(\'导管\'');
                html = html.replace(/style="top: 20%; left: 70%;" onclick="showDetail\('鳞叶表皮细胞'/, 'style="top: 70%; left: 59%;" onclick="showDetail(\'鳞叶表皮细胞\'');
                /* 注入两个新增粉末热点（原始HTML中不存在） */
                html = html.replace(
                    /(<div class="overlay-layer" id="powder-overlay">[\s\S]*?)(<\/div>\s*<div class="zoom-controls")/,
                    '$1' +
                    '<div class="hotspot" style="top: 25%; left: 89%;" onclick="showDetail(\'木纤维细胞\', \'较细长，壁较薄，有稀疏点状纹孔。\')"></div>' +
                    '<div class="hotspot" style="top: 70%; left: 25%;" onclick="showDetail(\'木薄壁细胞\', \'类长方形或不规则形，壁稍厚，有纹孔。\')"></div>' +
                    '$2'
                );
            }
            /* 为srcdoc中的相对路径设置<base>，指向主HTML所在目录 */
            const baseHref = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            html = html.replace('<head>', '<head><base href="' + baseHref + '">');
            /* 修复实验一：单选题答错后可重试 */
            if (i === 0) {
                const fixQuiz = '<script>' +
                    '(function(){' +
                    'var _origSelect=window.selectQuizOption;' +
                    'window.selectQuizOption=function(idx){' +
                    'var q=quizData[currentQuizIdx];' +
                    'if(idx===q.answer){' +
                    'window.parent.postMessage({type:"recordAnswer",expIdx:0,qIdx:currentQuizIdx,qType:"single-choice",userAnswer:idx,isCorrect:true},"*");' +
                    'document.querySelectorAll(".quiz-option").forEach(function(el,i){if(i===idx)el.classList.add("correct");});' +
                    'var fb=document.getElementById("quizFeedback");' +
                    'fb.className="quiz-feedback correct";fb.innerHTML="\\u2705 "+q.options[idx].explanation;fb.style.display="block";' +
                    'if(currentQuizIdx<quizData.length-1){document.getElementById("nextQuizBtn").style.display="inline-block";}' +
                    'else{document.getElementById("finishQuizBtn").style.display="inline-block";}' +
                    '}else{' +
                    'window.parent.postMessage({type:"recordAnswer",expIdx:0,qIdx:currentQuizIdx,qType:"single-choice",userAnswer:idx,isCorrect:false},"*");' +
                    'document.querySelectorAll(".quiz-option").forEach(function(el,i){if(i===idx)el.classList.add("wrong");});' +
                    'var fb=document.getElementById("quizFeedback");' +
                    'fb.className="quiz-feedback wrong";fb.innerHTML="\\u274c "+q.options[idx].explanation+"<br><button onclick=\\"loadQuizQuestion()\\" style=\\"margin-top:8px;padding:6px 16px;border-radius:6px;background:#2D593E;color:#fff;border:none;cursor:pointer;font-size:14px;\\">\\u91cd\\u65b0\\u4f5c\\u7b54</button>";fb.style.display="block";' +
                    '}' +
                    '};' +
                    '})();' +
                    '<\\/script>';
                html = html.replace('</body>', fixQuiz + '</body>');
            }
            const iframe = document.getElementById('iframe' + i);
            iframe.srcdoc = html;
            loaded[i] = true;

            /* iframe加载后动态调整高度 */
            iframe.onload = function() {
                if (window.innerWidth <= 768) {
                    resizeIframe(iframe);
                }
            };
        }

        /* 动态调整iframe高度以适应内容 */
        function resizeIframe(iframe) {
            try {
                var doc = iframe.contentDocument || iframe.contentWindow.document;
                if (!doc || !doc.body) return;
                
                /* 获取当前活跃页面的真实高度（而非scrollHeight，避免min-height干扰） */
                var activePage = doc.querySelector('.page.active') || doc.querySelector('#startPage.active') || doc.querySelector('#labPage.active') || doc.querySelector('#quizPage.active') || doc.querySelector('#resultPage.active') || doc.querySelector('#exam-page');
                var h = 0;
                if (activePage) {
                    h = activePage.offsetHeight + 20; /* 加点余量 */
                }
                if (h < 100) {
                    /* fallback：取body的offsetHeight */
                    h = doc.body.offsetHeight + 20;
                }
                
                /* 至少一个屏幕高 */
                var viewH = window.innerHeight - 44;
                if (h < viewH) h = viewH;
                
                iframe.style.height = h + 'px';
            } catch(e) { console.warn('resizeIframe error:', e); }
        }

        /* 手机端：持续监听iframe内容变化并调整高度 */
        var mobileResizeTimer = null;
        function setupMobileResize() {
            if (window.innerWidth > 768) return;
            if (mobileResizeTimer) clearInterval(mobileResizeTimer);
            mobileResizeTimer = setInterval(function() {
                var iframes = document.querySelectorAll('.iframe-container iframe');
                for (var k = 0; k < iframes.length; k++) {
                    if (iframes[k].classList.contains('active') || iframes[k].srcdoc) {
                        resizeIframe(iframes[k]);
                    }
                }
            }, 300);
        }
        setupMobileResize();
        window.addEventListener('resize', function() {
            if (window.innerWidth <= 768) setupMobileResize();
            else if (mobileResizeTimer) { clearInterval(mobileResizeTimer); mobileResizeTimer = null; }
        });

        function switchExperiment(i) {
            document.querySelectorAll('.nav-tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
            document.querySelectorAll('.iframe-container iframe').forEach((f, idx) => f.classList.toggle('active', idx === i));
            loadExperiment(i);
        }

        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;
            if (e.data.type === 'goToNext') {
                const next = e.data.experiment;
                if (next < 3) {
                    document.getElementById('tab' + next).classList.add('completed');
                    switchExperiment(next);
                }
            }
            // QuickForm: 接收子页面答题数据
            if (e.data.type === 'recordAnswer') {
                var expIdx = e.data.expIdx;
                var qIdx = e.data.qIdx;
                var qType = e.data.qType;
                var userAnswer = e.data.userAnswer;
                var isCorrect = e.data.isCorrect;
                recordFirstAnswer(expIdx, qIdx, qType, userAnswer, isCorrect);
            }
            // QuickForm: 实验完成时提交数据
            if (e.data.type === 'experimentComplete') {
                submitToQuickForm();
            }
        });

        loadExperiment(0);
        // 实验二、三改为懒加载：用户点击时才加载，不再预加载
        setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 500);
    </script>
</body>
</html>
